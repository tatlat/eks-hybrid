version: 0.2

env:
  secrets-manager:
    RHEL_USERNAME: "nodeadm-e2e-tests-redhat-credentials:username"
    RHEL_PASSWORD: "nodeadm-e2e-tests-redhat-credentials:password"

phases:
  pre_build:
    commands:
      - echo "Setting up for e2e tests..."
      - |
        if [ "$ENVIRONMENT" = "beta" ]; then
          export EKS_ENDPOINT=$BETA_EKS_ENDPOINT
          export EKS_CLUSTER_ROLE_SP=$BETA_EKS_CLUSTER_ROLE_SP
          export EKS_POD_IDENTITY_SP=$BETA_EKS_POD_IDENTITY_SP
        fi
      - export BUILD_NUMBER=${CODEBUILD_BUILD_NUMBER:-1}
      - export VERSION="build-${BUILD_NUMBER}"
      
      # Download test artifacts from S3 if USE_S3_TEST_BINARIES is set
      # This is used for regions where building from source is not possible
      - |
        if [ "${USE_S3_TEST_BINARIES:-false}" = "true" ]; then
          echo "Downloading test artifacts from S3..."
          
          # Download all test artifacts (binaries, buildspecs, scripts) from S3
          aws s3 sync --no-progress s3://$ARTIFACTS_BUCKET/${S3_TEST_BINARIES_PATH:-latest}/ ./
          
          # S3 structure is bin/linux/{amd64,arm64}/* but scripts expect _bin/{amd64,arm64}/*
          # Create the expected directory structure and copy files
          mkdir -p _bin/amd64 _bin/arm64
          
          # Copy nodeadm binaries (both amd64 and arm64 needed for test nodes)
          cp bin/linux/amd64/nodeadm* _bin/amd64/
          cp bin/linux/arm64/nodeadm* _bin/arm64/
          
          # Copy test binariess
          cp bin/linux/amd64/{nodeadm.test,conformance.test,addons.test,mixed_mode.test,e2e-test,ginkgo} _bin/amd64/
          
          # Make test binaries executable
          chmod +x _bin/amd64/{nodeadm.test,conformance.test,addons.test,mixed_mode.test,e2e-test,ginkgo}
          
          echo "Test artifacts downloaded and reorganized successfully from S3"
        else
          echo "Using locally built test binaries from CodePipeline artifacts"
        fi

  build:
    commands:
      # Upload binaries to versioned paths
      - echo "Uploading binaries for e2e tests..."
      - aws s3 cp --no-progress --content-encoding gzip --content-disposition "attachment; filename=\"nodeadm\"" _bin/amd64/nodeadm.gz s3://$ARTIFACTS_BUCKET/test-release/${VERSION}/bin/linux/amd64/nodeadm.gz
      - aws s3 cp --no-progress --content-encoding gzip --content-disposition "attachment; filename=\"nodeadm\"" _bin/arm64/nodeadm.gz s3://$ARTIFACTS_BUCKET/test-release/${VERSION}/bin/linux/arm64/nodeadm.gz
      
      # Run the e2e tests with versioned paths
      - SANITIZED_CODEBUILD_BUILD_ID=$(echo $CODEBUILD_BUILD_ID | tr ':' '-')
      - sleep $((RANDOM % 30)); # random sleep to introduce some jitter in concurrent test runs
      - ./hack/run-e2e.sh $SANITIZED_CODEBUILD_BUILD_ID $AWS_REGION $KUBERNETES_VERSION $CNI s3://$ARTIFACTS_BUCKET/test-release/${VERSION}/bin/linux/amd64/nodeadm.gz s3://$ARTIFACTS_BUCKET/test-release/${VERSION}/bin/linux/arm64/nodeadm.gz $LOGS_BUCKET e2e-artifacts

reports:
  e2e-reports:
    files:
      - e2e-artifacts/reports/junit-nodeadm.xml
    file-format: "JUNITXML"
  conformance-reports:
    files:
      - e2e-artifacts/conformance/junit-conformance.xml
    file-format: "JUNITXML"
artifacts:
  files:
  - "e2e-artifacts/*"
