---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: aws-pca-issuer
  namespace: aws-pca-issuer
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: aws-pca-issuer
rules:
  - apiGroups: ["cert-manager.io"]
    resources: ["certificaterequests", "certificates"]
    verbs: ["get", "list", "watch", "update"]
  - apiGroups: ["cert-manager.io"]
    resources: ["certificaterequests/status", "certificates/status"]
    verbs: ["update"]
  - apiGroups: ["awspca.cert-manager.io"]
    resources: ["awspcaissuers", "awspcaclusterissuers"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["awspca.cert-manager.io"]
    resources: ["awspcaissuers/status", "awspcaclusterissuers/status"]
    verbs: ["update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: aws-pca-issuer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: aws-pca-issuer
subjects:
  - kind: ServiceAccount
    name: aws-pca-issuer
    namespace: aws-pca-issuer
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aws-pca-issuer
  namespace: aws-pca-issuer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aws-pca-issuer
  template:
    metadata:
      labels:
        app: aws-pca-issuer
    spec:
      serviceAccountName: aws-pca-issuer
      containers:
        - name: aws-pca-issuer
          image: public.ecr.aws/cert-manager/aws-privateca-issuer:v1.2.0
          args:
            - --leader-elect=false
            - --v=2
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          resources:
            limits:
              cpu: 100m
              memory: 128Mi
            requests:
              cpu: 100m
              memory: 128Mi
