apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: awspcaissuers.awspca.cert-manager.io
spec:
  group: awspca.cert-manager.io
  names:
    kind: AWSPCAIssuer
    listKind: AWSPCAIssuerList
    plural: awspcaissuers
    singular: awspcaissuer
  scope: Namespaced
  versions:
    - name: v1beta1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: ["arn"]
              properties:
                arn:
                  type: string
                  description: "ARN is the AWS CA ARN"
                region:
                  type: string
                  description: "Region is the AWS region"
                secretRef:
                  type: object
                  properties:
                    name:
                      type: string
                    namespace:
                      type: string
            status:
              type: object
              properties:
                conditions:
                  type: array
                  items:
                    type: object
                    required: ["status", "type"]
                    properties:
                      lastTransitionTime:
                        type: string
                        format: date-time
                      message:
                        type: string
                      reason:
                        type: string
                      status:
                        type: string
                        enum: ["True", "False", "Unknown"]
                      type:
                        type: string
                        enum: ["Ready"]
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: ARN
          type: string
          jsonPath: .spec.arn
        - name: Ready
          type: string
          jsonPath: .status.conditions[?(@.type=="Ready")].status
        - name: Status
          type: string
          jsonPath: .status.conditions[?(@.type=="Ready")].message
          priority: 1
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
---
